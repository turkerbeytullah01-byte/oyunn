# Gradle Template for Project Aegis: Drone Dominion
# This file is used to configure the Gradle build

# Android Plugin for Gradle version
android.enableJetifier=true
android.useAndroidX=true

# Build configuration
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.daemon=true

# Enable R8 code shrinking
android.enableR8=true
android.enableR8.fullMode=true

# IL2CPP specific
unity.enableIl2Cpp=true
unity.il2cppCompilerFlags=-O3

# ABI Filters (ARM64 only for release)
android.defaultConfig.ndk.abiFilters=arm64-v8a

# Signing config (will be overridden by Unity)
RELEASE_STORE_FILE=projectaegis.keystore
RELEASE_KEY_ALIAS=projectaegis

# Optimization flags
android.enableDexingArtifactTransform.desugaring=false
android.bundle.enableUncompressedNativeLibs=true
